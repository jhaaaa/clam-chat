<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ab4f8" />
      <stop offset="18%" stop-color="#a78bfa" />
      <stop offset="36%" stop-color="#c084fc" />
      <stop offset="54%" stop-color="#7dd3fc" />
      <stop offset="72%" stop-color="#67e8f9" />
      <stop offset="90%" stop-color="#86efac" />
    </linearGradient>
  </defs>
  <!-- Clam shell outline shape, tilted like the reference image -->
