    <path d="M30 11 Q34 30 30 54" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
    <path d="M44 16 Q42 32 38 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
    <!-- Bottom edge / opening line -->
    <path d="M14 40 Q20 50 32 52 Q44 50 52 42" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
  </g>
